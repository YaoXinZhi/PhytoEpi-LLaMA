model: unsloth/llama-3-8b-bnb-4bit
seed: 26
split_seed: 26
dev_ratio: 0.10
max_seq_length: 8192
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
lora:
  r: 16
  alpha: 32
optimization:
  learning_rate: 2.0e-5
  min_learning_rate: 3.0e-6
  early_stopping_patience: 3
data:
  included_sources:
    - EPOP:train
    - DP:train
    - DP:dev
    - BB4:train
    - BB4:dev
  held_out:
    - EPOP:dev
